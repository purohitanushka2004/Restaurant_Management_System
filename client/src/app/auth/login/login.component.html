  <!-- RIGHT FORM AREA -->
  <div class="login-form-area">

    <div class="login-card">

      <!-- Accent Bar -->
      <div class="card-accent-bar">
        <span class="accent-bar-fill"></span>
      </div>

      <!-- Header -->
      <div class="card-header">

        <div class="card-logo">
          <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="14"
              fill="rgba(255,94,26,0.12)" />

            <rect x="0.7" y="0.7" width="46.6" height="46.6"
              rx="13.3"
              stroke="rgba(255,94,26,0.45)"
              stroke-width="1.4" />

            <path d="M12 34 Q24 14 36 34"
              stroke="#FF5E1A"
              stroke-width="3"
              fill="none"
              stroke-linecap="round" />

            <circle cx="24" cy="16" r="4" fill="#FF5E1A" />
          </svg>
        </div>

        <div class="card-header-text">

          <span class="card-eyebrow">
            Secure Access
          </span>

          <h2 class="card-title">
            Welcome Back
          </h2>

          <p class="card-subtitle">
            Sign in to continue to your dashboard
          </p>

        </div>

      </div>

      <!-- Divider -->
      <div class="modal-divider">
        <span class="divider-line"></span>
        <span class="divider-diamond">◆</span>
        <span class="divider-line"></span>
      </div>

      <!-- Error -->
      <div class="error-banner" *ngIf="error" role="alert">
        <span class="error-icon">⚠️</span>
        <span>{{ error }}</span>
      </div>

      <!-- FORM -->
      <form
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()"
        class="login-form"
        novalidate>

        <!-- USERNAME -->
        <div
          class="field-group"
          [class.field-error]="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">

          <label class="field-label" for="username">
            <span class="label-index">01</span>
            <span>Username</span>
          </label>

          <div class="field-wrapper">

            <span class="field-icon">

              <svg width="16" height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2">

                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>

              </svg>

            </span>

            <input
              id="username"
              formControlName="username"
              type="text"
              class="field-input"
              placeholder="Enter your username"
              autocomplete="username" />

          </div>

        </div>

        <!-- PASSWORD -->
        <div
          class="field-group"
          [class.field-error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">

          <label class="field-label" for="password">
            <span class="label-index">02</span>
            <span>Password</span>
          </label>

          <div class="field-wrapper">

            <span class="field-icon">

              <svg width="16" height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2">

                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>

              </svg>

            </span>

            <input
              id="password"
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              class="field-input"
              placeholder="Enter your password"
              autocomplete="current-password" />

            <!-- Toggle Password -->
            <button
              type="button"
              class="toggle-password"
              (click)="togglePassword()">

              <svg *ngIf="!showPassword"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2">

                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>

              </svg>

              <svg *ngIf="showPassword"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2">

                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20"/>
                <line x1="1" y1="1" x2="23" y2="23"/>

              </svg>

            </button>

          </div>

        </div>

        <!-- FORGOT PASSWORD -->
        <div class="form-meta">
          <a href="#" class="forgot-link">
            Forgot password?
          </a>
        </div>

        <!-- CAPTCHA -->
        <div class="captcha-section">

          <label class="field-label captcha-label">
            <span class="label-index">03</span>
            <span>Security Verification</span>
          </label>

          <div class="captcha-wrapper">
            <div id="login-recaptcha"></div>
          </div>

        </div>

        <!-- SUBMIT -->
        <button
          type="submit"
          class="submit-btn"
          [disabled]="loading || loginForm.invalid">

          <span
            class="submit-btn__text"
            *ngIf="!loading">

            Sign In

          </span>

          <span
            class="submit-btn__text"
            *ngIf="loading">

            <span class="spinner"></span>
            Signing in...

          </span>

          <span class="submit-btn__shimmer"></span>

        </button>

      </form>

      <!-- FOOTER -->
      <div class="card-footer">

        <div class="modal-divider modal-divider--sm">
          <span class="divider-line"></span>
          <span class="divider-diamond">◆</span>
          <span class="divider-line"></span>
        </div>

        <p>
          Don't have an account?

          <a
            routerLink="/register"
            class="register-link">

            Create account

          </a>

        </p>

      </div>

    </div>

  </div>

</div>
